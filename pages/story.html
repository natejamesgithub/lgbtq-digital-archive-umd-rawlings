<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Story • D.C. LGBTQ+ Digital Archive</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <header class="navbar">
      <div class="nav-inner">
        <h1 class="brand">D.C. LGBTQ+ Digital Archive</h1>
        <nav class="nav-links" aria-label="Primary">
          <a href="./index.html">Home</a>
          <a href="./browse.html">Browse</a>
          <a href="./about.html">About</a>
          <a href="./contribute.html">Contribute</a>
          <a href="./admin.html">Admin</a>
        </nav>
      </div>
    </header>

    <main class="main-content story-page">
      <p class="story-back"><a class="text-link" href="./browse.html">← Back to browse</a></p>
      <h2 id="title"></h2>
      <p id="summary" class="story-summary"></p>
      <div id="storyMeta" class="story-meta"></div>
      <img id="hero" alt="" />

      <section id="body" class="story-body"></section>

      <section id="audioSection" class="audio-section" hidden>
        <h3>Audio</h3>
        <audio id="audio" controls></audio>
        <pre id="transcript"></pre>
      </section>

      <section id="gallerySection" hidden>
        <h3>Gallery</h3>
        <section id="gallery" class="gallery-grid"></section>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="../js/story.js"></script>
  </body>
</html>
